version: '3.9'

services:
  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/1

  celery:
    build: .
    command: celery -A config worker -B --loglevel=info
    volumes:
      - .:/code
    depends_on:
      - redis
      - web